<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
    <title>Antisteez.com</title>
    <style>
        :root {
            /* Colors pulled from the 'dark' utility classes in your CSS */
            --color-bg: #111827; /* Dark gray-900 from your tailwind block */
            --color-text: #f3f4f6; /* Gray-100 from your tailwind block */
            --color-link: #3b82f6; /* Blue-500 from your tailwind block */
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            /* The exact font stack from your provided CSS */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            line-height: 1.5;
            font-size: 0.9rem;
            margin: 0;
            -webkit-text-size-adjust: 100%;
        }

        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 10px;
            min-height: 80vh;
            padding: 20px;
        }

        .left-block {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .right-block {
            max-width: 290px;
            width: 100%;
            text-align: left;
            min-height: 600px;
        }

        #cusdis_thread iframe {
            min-height: 600px !important;
            width: 100% !important;
        }

        img {
            margin-bottom: 20px;
            max-width: 100%;
            height: auto;
        }

        a {
            color: var(--color-link);
            text-decoration: underline;
        }

        p {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <main>
        <div class="left-block">
            <header>
                <img src="https://raw.githubusercontent.com/antisteez/antisteez.github.io/refs/heads/main/antisteez-2026-web.svg" width="400" alt="Logo">
            </header>
            <p>Your short paragraph goes here.</p>
            <a href="https://yourlink.com">Click here for your link</a>
        </div>

        <div class="right-block">
            <div id="cusdis_thread"
                data-host="https://cusdis.com"
                data-app-id="558a3fd6-ab4c-4e3e-b04e-d2e7a1573e8c"
                data-page-id="homepage"
                data-page-url="https://antisteez.github.io"
                data-page-title="Antisteez Guestbook"
                data-theme="dark"
            ></div>
            <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
        </div>
    </main>
</body>
</html>
