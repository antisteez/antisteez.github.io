<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
    <title>Antisteez.com</title>
    <style>
        :root {
            --color-bg: #121212;
            --color-text: #e0e0e0;
            --color-link: #4da6ff; /* A soft blue for the link so it is readable */
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        main {
            text-align: center;
            max-width: 600px;
            margin: auto;
            padding-top: 50px;
        }

        a {
            color: var(--color-link);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <img src="https://raw.githubusercontent.com/antisteez/antisteez.github.io/refs/heads/main/antisteez-2026-web.svg" style="max-width: 100%; height: auto;" width="400" alt="Logo">
        </header>
        <p>A short paragraph goes here.</p>
        <a href="https://google.com">A link goes here</a>
    </main>
</body>
</html>
