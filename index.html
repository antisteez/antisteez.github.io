<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
    <title>Antisteez.com</title>
    <style>
        :root {
            --color-bg: #111827; 
            --color-text: #f3f4f6;
            --color-link: #3b82f6;
            --color-border: #4b5563;
            --color-input-bg: #0d121f; 
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.3;
            letter-spacing: -0.01rem;
            font-size: 0.9rem;
            margin: 0;
        }

        header.top-logo {
            text-align: center;
            padding: 40px 20px 10px 20px;
        }

        header.top-logo img {
            max-width: 600px;
            width: 100%;
            height: auto;
        }

        .content-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 60px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .left-block {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .right-block {
            max-width: 320px;
            width: 100%;
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
            padding: 0 !important;
            margin-top: 0;
        }

        h3 {
            font-size: 0.9rem;
            border-bottom: none;
            display: inline-block;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text);
        }

        #comment-form {
            background: transparent !important;
            padding: 0 !important;
            border: none !important;
            margin-bottom: 30px;
            box-shadow: none !important;
            width: 100%;
        }

        /* Ensuring all form elements are identical in width */
        #comment-form input, 
        #comment-form textarea, 
        #comment-form button {
            width: 100%;
            box-sizing: border-box; /* This keeps padding inside the 100% width */
            display: block;
            margin-bottom: 10px;
            border-radius: 4px;
            font-family: inherit;
        }

        #comment-form input, 
        #comment-form textarea {
            background: var(--color-input-bg);
            color: var(--color-text);
            font-size: 0.85rem;
            border: 1px solid var(--color-border);
            padding: 10px;
            transition: all 0.2s ease-in-out;
        }

        #comment-form input:focus, 
        #comment-form textarea:focus {
            border-color: var(--color-link);
            outline: none;
        }

        #comment-form button {
            background: var(--color-link);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .comment-item {
            border-bottom: 1px solid var(--color-border);
            padding: 15px 0;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .comment-name {
            font-weight: bold;
            color: var(--color-link);
            font-size: 0.85rem;
        }

        .comment-date {
            font-size: 0.65rem;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .comment-body {
            margin: 0;
            color: var(--color-text);
            font-size: 0.85rem;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <header class="top-logo">
        <img src="https://raw.githubusercontent.com/antisteez/antisteez.github.io/refs/heads/main/antisteez-2026-web.svg" alt="Logo">
    </header>

    <main class="content-wrapper">
        <div class="left-block">
            <p>Your short paragraph goes here.</p>
            <a href="https://yourlink.com">Click here for your link</a>
        </div>

        <div class="right-block">
            <h3>SHARE YOUR ANTISTEEZ STORY BELOW</h3>
            <form id="comment-form">
                <input name="Name" type="text" placeholder="Your Name" required>
                <textarea name="Comment" rows="3" placeholder="Leave a comment..." required></textarea>
                <button type="submit" id="submit-btn">Post Comment</button>
            </form>

            <div id="comments-list">Loading comments...</div>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwsJXrHieq03Kh1Hrfi2mhg2igNoQfBh87sjgii0KNNg05B2Cts1J8YZj1XB1Yt8hL5/exec';
        const form = document.getElementById('comment-form');
        const list = document.getElementById('comments-list');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = 'Posting...';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                form.reset();
                btn.disabled = false;
                btn.innerText = 'Post Comment';
                loadComments();
            })
            .catch(err => {
                console.error('Error!', err.message);
                btn.disabled = false;
                btn.innerText = 'Post Comment';
            });
        });

        function loadComments() {
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    list.innerHTML = '<p style="font-size: 0.8rem; opacity: 0.6;">No comments yet. Be the first!</p>';
                    return;
                }
                list.innerHTML = data.reverse().map(item => `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-name">${item.Name}</span>
                            <span class="comment-date">${new Date(item.Date).toLocaleDateString()}</span>
                        </div>
                        <p class="comment-body">${item.Comment}</p>
                    </div>
                `).join('');
            })
            .catch(err => {
                list.innerHTML = 'Error loading comments.';
            });
        }

        loadComments();
    </script>
</body>
</html>
