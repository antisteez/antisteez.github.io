<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
    <title>Antisteez.com</title>
    <style>
        :root {
            --color-bg: #121212;
            --color-text: #e0e0e0;
            --color-link: #4da6ff;
            --color-accent: #4da6ff; /* Matches link for mvp.css elements */
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }

        /* This container keeps everything exactly 400px wide or less */
        .content-wrapper {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        img {
            margin-bottom: 20px;
        }

        a {
            color: var(--color-link);
        }
    </style>
</head>
<body>
    <main>
        <div class="content-wrapper">
            <header>
                <img src="https://raw.githubusercontent.com/antisteez/antisteez.github.io/refs/heads/main/antisteez-2026-web.svg" style="max-width: 100%; height: auto;" width="400" alt="Logo">
            </header>
            <p>Your short paragraph goes here. By wrapping this in a specific container, the text will never be wider than the 400px logo above it.</p>
            <a href="https://yourlink.com">Click here for your link</a>
        </div>
    </main>
</body>
</html>
