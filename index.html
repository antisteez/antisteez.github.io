<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
    <title>Antisteez.com</title>
    <style>
        :root {
            /* This sets the base color under the transparency */
            --color-bg-base: #000000;
            --color-text: #e5e7eb;
            --color-link: #3b82f6;
        }

        html {
            background-color: var(--color-bg-base);
        }

        body {
            /* This is the exact value you found */
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            font-size: 0.9rem;
            margin: 0;
        }

        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 10px;
            min-height: 80vh;
            padding: 20px;
        }

        .left-block {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .right-block {
            max-width: 290px;
            width: 100%;
            text-align: left;
            min-height: 600px;
        }

        #cusdis_thread iframe {
            min-height: 600px !important;
            width: 100% !important;
            border: none !important;
            background-color: transparent !important;
        }

        img {
            margin-bottom: 20px;
        }

        a {
            color: var(--color-link);
            text-decoration: underline;
        }

        p {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <main>
        <div class="left-block">
            <header>
                <img src="https://raw.githubusercontent.com/antisteez/antisteez.github.io/refs/heads/main/antisteez-2026-web.svg" style="max-width: 100%; height: auto;" width="400" alt="Logo">
            </header>
            <p>Your short paragraph goes here.</p>
            <a href="https://yourlink.com">Click here for your link</a>
        </div>

        <div class="right-block">
            <div id="cusdis_thread"
                data-host="https://cusdis.com"
                data-app-id="558a3fd6-ab4c-4e3e-b04e-d2e7a1573e8c"
                data-page-id="homepage"
                data-page-url="https://antisteez.github.io"
                data-page-title="Antisteez Home"
                data-theme="dark"
            ></div>
            <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
        </div>
    </main>
</body>
</html>
